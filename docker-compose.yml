services:
  db:
    image: postgres:16
    container_name: ebatec_stock_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ebatec_stock
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ebatec123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: